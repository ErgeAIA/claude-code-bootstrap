name: Update Hooks Checksums

on:
  schedule:
    # 每周一 UTC 02:00（北京时间 10:00）
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-and-update:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download hooks and compute SHA256
        shell: pwsh
        run: |
          $REPO_BASE = 'https://raw.githubusercontent.com/disler/claude-code-hooks-mastery/main/.claude'
          $files = @{
            'hooks/pre_tool_use.py'         = 'pre_tool_use.py'
            'hooks/post_tool_use.py'        = 'post_tool_use.py'
            'hooks/session_start.py'        = 'session_start.py'
            'hooks/user_prompt_submit.py'   = 'user_prompt_submit.py'
            'hooks/post_tool_use_failure.py'= 'post_tool_use_failure.py'
            'hooks/session_end.py'          = 'session_end.py'
            'status_lines/status_line_v6.py'= 'status_line_v6.py'
          }

          $newChecksums = @{}
          foreach ($entry in $files.GetEnumerator()) {
            $url = "$REPO_BASE/$($entry.Key)"
            $tmpFile = Join-Path $env:TEMP $entry.Value
            Write-Host "Downloading $($entry.Value)..."
            Invoke-WebRequest -Uri $url -OutFile $tmpFile -TimeoutSec 30
            $hash = (Get-FileHash -Path $tmpFile -Algorithm SHA256).Hash.ToUpper()
            $newChecksums[$entry.Value] = $hash
            Write-Host "  SHA256: $hash"
            Remove-Item $tmpFile -Force
          }

          # Write new checksums.txt
          $lines = @(
            '# SHA256 checksums for downloaded hooks and status_line',
            '# Generated from disler/claude-code-hooks-mastery repository',
            '# Verify with: Get-FileHash -Algorithm SHA256 <file> | Select-Object -ExpandProperty Hash'
          )
          foreach ($entry in $newChecksums.GetEnumerator() | Sort-Object Key) {
            $lines += "$($entry.Key):$($entry.Value)"
          }
          Set-Content -Path checksums.txt -Value $lines -Encoding UTF8

          # Update $CHECKSUMS in setup-claude.ps1
          $setupContent = Get-Content -Raw setup-claude.ps1
          $checksumsBlock = "@{`n"
          foreach ($entry in $newChecksums.GetEnumerator() | Sort-Object Key) {
            $padding = if ($entry.Key.Length -lt 24) { ' ' * (24 - $entry.Key.Length) } else { '' }
            $checksumsBlock += "    '$($entry.Key)'$padding= '$($entry.Value)'`n"
          }
          $checksumsBlock += "}"
          $setupContent = $setupContent -replace "(?s)\$CHECKSUMS = @\{.*?\}", "`$CHECKSUMS = $checksumsBlock"
          Set-Content -Path setup-claude.ps1 -Value $setupContent -Encoding UTF8 -NoNewline

          Write-Host "checksums.txt and setup-claude.ps1 updated"

      - name: Check for changes
        id: diff
        shell: pwsh
        run: |
          $diff = git diff --name-only
          if ($diff) {
            Write-Host "Changes detected in: $diff"
            "changed=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            Write-Host "No changes detected"
            "changed=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $date = Get-Date -Format 'yyyy-MM-dd'
          $branch = "update-checksums/$date"
          git checkout -b $branch
          git add checksums.txt setup-claude.ps1
          git commit -m "chore: update hooks checksums ($date)"
          git push origin $branch
          gh pr create `
            --title "chore: update hooks checksums ($date)" `
            --body "Upstream hooks from disler/claude-code-hooks-mastery have changed.`n`nPlease review the checksum updates before merging.`n`nAuto-generated by [update-checksums workflow]." `
            --base main
